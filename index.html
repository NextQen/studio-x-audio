<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NextGen Viewer - Premium YouTube Multi-View Dashboard with advanced audio controller.">
    <title>NextGen Viewer | Premium Dashboard & Audio Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>NextGen Viewer</h1>
        <p>Advanced YouTube Bulk Multi-View Workspace</p>
        
        <div id="ipBanner" class="ip-banner">
            ⚠️ <span>IP Protection Active: Ensure your VPN is ON before hitting Play to bypass YT detection!</span>
        </div>

        <div class="controls">
            <input type="text" id="ytLink" placeholder="Paste YouTube Link here...">
            <input type="number" id="tabCount" placeholder="Tabs" min="1" max="25" value="4">
            <button onclick="addVideos()">Play Videos</button>
            <button id="unmuteBtn" onclick="unmuteAllVideos()" style="background: linear-gradient(135deg, #00b4db, #0083b0); display: none;">🔊 Unmute All Tabs</button>
        </div>
    </header>
    
    <div id="videoContainer" class="container"></div>

    <script src="script.js"></script>
</body>
</html>
